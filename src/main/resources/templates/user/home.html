<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/user/home">🎥 SMART CINEMA</a>
        <div class="d-flex align-items-center">
            <a href="/user/tickets" class="btn btn-outline-info btn-sm me-3">Vé của tôi</a>

            <a href="/profile">
                <img th:src="'https://ui-avatars.com/api/?name=' + ${session.user?.fullName}"
                     class="rounded-circle border border-2 border-primary"
                     style="width: 40px; cursor: pointer;">
            </a>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <h2 class="text-center mb-4">Danh Sách Phim Đang Chiếu</h2>
    <div class="row">
        <div class="col-md-3 mb-4" th:each="movie : ${movies}">
            <div class="card h-100 shadow-sm border-0">
                <img th:src="${movie.posterUrl}" class="card-img" style="height: 350px; object-fit: cover;">
                <div class="card-body">
                    <h5 class="fw-bold" th:text="${movie.title}"></h5>
                    <p class="text-muted small" th:text="${movie.genre.name}"></p>
                    <a th:href="@{'/user/booking/' + ${movie.id}}" class="btn btn-primary w-100">Chọn ghế & Đặt vé</a>
                </div>
            </div>
        </div>
    </div>
</div>
