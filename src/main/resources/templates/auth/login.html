<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập - Cinema</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-4 card p-4 shadow border-0" style="border-radius: 15px;">
            <h3 class="text-center mb-4 fw-bold text-primary">Đăng Nhập</h3>

            <form th:action="@{/login}" method="post" novalidate>

                <div class="mb-3">
                    <label class="form-label fw-bold">Tên đăng nhập</label>
                    <input type="text" name="username" class="form-control" placeholder="Nhập username..." required>
                    <small th:if="${errUser}" class="text-danger fw-bold" th:text="${errUser}"></small>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Mật khẩu</label>
                    <input type="password" name="password" class="form-control" placeholder="********" required>
                    <small th:if="${errPass}" class="text-danger fw-bold" th:text="${errPass}"></small>
                </div>

                <div th:if="${error}" class="alert alert-danger py-2" style="font-size: 14px;" th:text="${error}"></div>

                <button type="submit" class="btn btn-primary w-100 fw-bold py-2 shadow-sm">Đăng nhập</button>
            </form>

            <p class="mt-3 text-center">Chưa có tài khoản? <a href="/register" class="text-decoration-none text-success">Đăng ký ngay</a></p>
        </div>
    </div>
</div>
</body>
</html>
