<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Đăng nhập - Smart Cinema</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-4 card p-4 shadow">
            <h3 class="text-center">Đăng Nhập</h3>
            <form th:action="@{/login}" method="post">
                <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                <div class="mb-3">
                    <label class="form-label">Tên đăng nhập</label>
                    <input type="text" name="username" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Mật khẩu</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Vào hệ thống</button>
            </form>
            <p class="mt-3 text-center">Chưa có tài khoản? <a href="/register">Đăng ký ngay</a></p>
        </div>
    </div>
</div>
</body>
</html>
