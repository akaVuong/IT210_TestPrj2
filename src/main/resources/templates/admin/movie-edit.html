<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Sửa thông tin phim</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
<div class="col-md-8 mx-auto card p-4 shadow">
  <h3 class="text-warning">Cập nhật thông tin phim</h3>
  <hr>
  <form th:action="@{/admin/movies/edit}" th:object="${movie}" method="post">
    <input type="hidden" th:field="*{id}">

    <div class="mb-3">
      <label class="form-label">Tên phim</label>
      <input type="text" th:field="*{title}" class="form-control" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Mô tả phim</label>
      <textarea th:field="*{description}" class="form-control" rows="3"></textarea>
    </div>
    <div class="row">
      <div class="col-md-6 mb-3">
        <label class="form-label">Thời lượng (phút)</label>
        <input type="number" th:field="*{duration}" class="form-control" required>
      </div>
      <div class="col-md-6 mb-3">
        <label class="form-label">Thể loại</label>
        <select th:field="*{genre.id}" class="form-select" required>
          <option th:each="g : ${genres}"
                  th:value="${g.id}"
                  th:text="${g.name}"
                  th:selected="${movie.genre != null && g.id == movie.genre.id}">
          </option>
        </select>
      </div>
    </div>
    <div class="mt-3">
      <button type="submit" class="btn btn-warning">Cập nhật ngay</button>
      <a href="/admin/movies" class="btn btn-secondary">Quay lại</a>
    </div>
  </form>
</div>
</body>
</html>
