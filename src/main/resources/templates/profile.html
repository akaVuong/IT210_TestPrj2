<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Hồ sơ cá nhân</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
<div class="card p-4 shadow">
    <h2 class="text-primary">Hồ sơ người dùng</h2>
    <hr>
    <p><strong>Tên đăng nhập:</strong> <span th:text="${session.user.username}"></span></p>
    <p><strong>Họ và tên:</strong> <span th:text="${session.user.fullName}"></span></p>
    <p><strong>Quyền hạn:</strong>
        <span class="badge bg-info" th:text="${session.user.role}"></span>
    </p>

    <div class="mt-4">
        <a th:if="${session.user.role.name() == 'ADMIN'}" href="/admin/movies" class="btn btn-dark">Về trang quản lý</a>
        <a th:if="${session.user.role.name() == 'STAFF'}" href="/staff/counter" class="btn btn-primary">Về trang tại quầy</a>
        <a th:if="${session.user.role.name() == 'CUSTOMER'}" href="/home" class="btn btn-success">Tiếp tục đặt vé</a>

        <a href="/logout" class="btn btn-danger">Đăng xuất</a>
    </div>
</div>
</body>
</html>
